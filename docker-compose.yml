version: '3.8'

services:


  backend:
    build:
      context: ./backend
    container_name: scraper_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/scraper.db
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
      - ./data:/data

  frontend:
    build:
      context: ./frontend
    container_name: scraper_frontend
    restart: always
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend


